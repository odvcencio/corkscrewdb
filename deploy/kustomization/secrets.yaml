# =============================================================================
# DO NOT APPLY AS-IS.
#
# The `data:` values below are stub placeholders (base64 of a literal string
# like "REPLACE_WITH_REAL_TOKEN"). They are NOT real tokens and MUST be
# replaced before this file is applied to a cluster.
#
# The preferred path is to SKIP hand-editing this file entirely and create
# each Secret out-of-band with `kubectl create secret generic ...`. See
# README.md in this directory for token generation (openssl rand -hex 32)
# and the exact `kubectl create secret` commands.
#
# This file exists so that `kubectl apply -k deploy/kustomization/` renders
# the expected Secret names for reference tooling; operators are expected to
# either (a) overwrite each Secret with their own values before applying, or
# (b) remove secrets.yaml from kustomization.yaml and create all Secrets
# out-of-band.
#
# The `harbor-m31labs` image pull Secret is intentionally NOT declared here.
# Create it with `kubectl create secret docker-registry` (see README.md).
# =============================================================================
